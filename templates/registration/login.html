<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-1 text-center">Crypto Tracker</h1>
    <p class="text-lg font-semibold mb-4 text-center">Iniciar sesión</p>
    <!-- Django proporciona el form de autenticación automáticamente en la vista LoginView -->
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex items-center justify-between">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Entrar</button>
        <a href="{% url 'register' %}" class="text-sm text-blue-600">Crear cuenta</a>
      </div>
    </form>
  </div>
</body>
</html>
